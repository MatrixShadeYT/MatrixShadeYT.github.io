<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="MatrixShadeYT">
    <meta name="description" content="Social Media Links for Matrix Techno">
    <title>Socials - Matrix Techno</title>
    <style>
      /* Reset and base styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at center, #11151c 0%, #07090e 70%, #020305 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 25px;
        padding: 40px 20px; /* Increased top/bottom padding for the longer list */
        overflow-x: hidden;
        overflow-y: auto; /* Allows scrolling if the list gets long on small screens */
        position: relative;
      }

      /* Background Canvas */
      .space-bg {
        position: fixed; /* Fixed so it stays in place if you scroll */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      /* Crimson Title */
      .main-title {
        color: #ff2a2a;
        font-size: 2.3rem;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        z-index: 10;
        text-shadow: 0 0 10px rgba(255, 42, 42, 0.6);
        text-align: center;
      }

      /* Social Links Container */
      .social-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 450px;
        z-index: 10;
      }

      /* Social Button Styling */
      .social-button {
        text-decoration: none;
        background: rgba(30, 30, 30, 0.75);
        color: #4af626;
        border: 2px solid #333333;
        border-radius: 8px;
        padding: 14px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.3s ease;
        backdrop-filter: blur(4px);
      }

      .social-handle {
        color: #aaaaaa;
        font-size: 0.9rem;
        font-weight: 400;
        transition: color 0.3s ease;
      }

      /* Hover effects */
      .social-button:hover, .social-button:focus {
        background: #4af626;
        color: #121212;
        border-color: #4af626;
        transform: translateX(6px);
        box-shadow: 0 5px 15px rgba(74, 246, 38, 0.3);
      }

      .social-button:hover .social-handle {
        color: #222222;
      }

      /* Back Button to return home */
      .back-home {
        text-decoration: none;
        color: #ff2a2a;
        font-size: 0.9rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        z-index: 10;
        margin-top: 15px;
        transition: all 0.2s ease;
        opacity: 0.7;
      }

      .back-home:hover {
        opacity: 1;
        text-shadow: 0 0 8px rgba(255, 42, 42, 0.5);
      }
    </style>
  </head>
  <body>

    <canvas class="space-bg" id="spaceCanvas"></canvas>

    <h1 class="main-title">Connect</h1>

    <div class="social-container">
      <a href="https://youtube.com/@MatrixShadeYT" target="_blank" rel="noopener noreferrer" class="social-button">
        <span>YouTube</span>
        <span class="social-handle">@MatrixShadeYT</span>
      </a>
      
      <a href="https://github.com/MatrixShadeYT" target="_blank" rel="noopener noreferrer" class="social-button">
        <span>GitHub</span>
        <span class="social-handle">MatrixShadeYT</span>
      </a>

      <a href="https://discord.gg/qyqQNbyreU" target="_blank" rel="noopener noreferrer" class="social-button">
        <span>Discord</span>
        <span class="social-handle">Join Server</span>
      </a>

      <a href="https://instagram.com/MatrixShadeYT" target="_blank" rel="noopener noreferrer" class="social-button">
        <span>Instagram</span>
        <span class="social-handle">@MatrixShadeYT</span>
      </a>

      <a href="https://tiktok.com/@MatrixShadeYT" target="_blank" rel="noopener noreferrer" class="social-button">
        <span>TikTok</span>
        <span class="social-handle">@MatrixShadeYT</span>
      </a>

      <a href="https://unvale.io/MatrixShadeYT" target="_blank" rel="noopener noreferrer" class="social-button">
        <span>Unvale</span>
        <span class="social-handle">MatrixShadeYT</span>
      </a>
    </div>

    <a href="/" class="back-home">← Return Home</a>

    <script>
      const canvas = document.getElementById('spaceCanvas');
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      const numParticles = 40;
      const particles = [];
      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5 + 0.5,
          speed: Math.random() * 0.4 + 0.1
        });
      }

      function animate() {
        ctx.fillStyle = 'rgba(7, 9, 14, 0.2)'; 
        ctx.fillRect(0, 0, width, height);
        const centerX = width / 2;
        const centerY = height / 2;

        particles.forEach(p => {
          let dx = centerX - p.x;
          let dy = centerY - p.y;
          let distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 10) {
            if (Math.random() > 0.5) {
              p.x = Math.random() > 0.5 ? 0 : width;
              p.y = Math.random() * height;
            } else {
              p.x = Math.random() * width;
              p.y = Math.random() > 0.5 ? 0 : height;
            }
            p.size = Math.random() * 1.5 + 0.5;
            p.speed = Math.random() * 0.4 + 0.1;
            dx = centerX - p.x;
            dy = centerY - p.y;
            distance = Math.sqrt(dx * dx + dy * dy);
          }

          p.x += (dx / distance) * p.speed;
          p.y += (dy / distance) * p.speed;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(74, 246, 38, ${Math.min(0.3, 100 / distance)})`;
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();
    </script>
  </body>
</html>
